<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220">
  <rect width="500" height="220" fill="#fff"/>
  <!-- Oval laranja acima do é -->
  <ellipse cx="342" cy="50" rx="18" ry="11" fill="#F5A623" transform="rotate(-15 342 50)"/>
  <!-- Texto La Santé azul escuro bold -->
  <text x="245" y="128"
    font-family="'Arial Black','Arial Bold',Arial,sans-serif"
    font-size="92"
    font-weight="900"
